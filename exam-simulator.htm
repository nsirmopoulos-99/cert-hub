<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google Certification Exam Simulator (Normal & Difficult Modes)</title>
<style>
    :root{--primary:#1a73e8;--primary-dark:#1765cc;--success:#188038;--warning:#f9ab00;--danger:#d93025;--text:#202124;--bg:#f8f9fa;--card-bg:#ffffff;--border:#dadce0;--diff-bg:#3c4043;--diff-text:#fff;}
    *{box-sizing:border-box;font-family:'Roboto','Segoe UI',sans-serif}
    body{margin:0;padding:0;background-color:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
    .container{max-width:900px;margin:40px auto;padding:20px;width:100%}
    h1,h2{text-align:center;color:var(--text)}.subtitle{text-align:center;color:#5f6368;margin-bottom:30px}
    .card{background:var(--card-bg);border-radius:8px;box-shadow:0 1px 2px 0 rgba(60,64,67,0.3);padding:30px;margin-bottom:20px}
    .screen{display:none;animation:fadeIn 0.3s ease-in-out}.screen.active{display:block}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    
    /* New Grid Layout for Categories */
    .category-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;margin-bottom:20px}
    .category-card{border:1px solid var(--border);border-radius:8px;padding:20px;background:#fff;transition:0.2s}
    .category-card:hover{box-shadow:0 4px 8px rgba(0,0,0,0.1)}
    .cat-title{font-size:1.2em;font-weight:bold;margin-bottom:5px;color:var(--text)}
    .cat-meta{font-size:0.85em;color:#5f6368;margin-bottom:15px}
    
    .mode-buttons{display:flex;gap:10px}
    .mode-btn{flex:1;padding:10px;border-radius:4px;border:none;cursor:pointer;font-weight:500;transition:0.2s}
    .mode-normal{background:#e8f0fe;color:var(--primary);border:1px solid transparent}
    .mode-normal:hover{background:#d2e3fc;border-color:var(--primary)}
    .mode-difficult{background:#f1f3f4;color:#3c4043;border:1px solid transparent}
    .mode-difficult:hover{background:#3c4043;color:#fff}

    .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:3px;margin-bottom:20px}
    .progress-fill{height:100%;background:var(--primary);width:0%;transition:width 0.3s ease}
    .progress-fill.difficult{background:var(--diff-bg)} /* Dark bar for difficult mode */

    .question-meta{display:flex;justify-content:space-between;font-size:0.9em;color:#5f6368;margin-bottom:15px}
    .diff-tag{background:#3c4043;color:#fff;padding:2px 6px;border-radius:4px;font-size:0.8em;font-weight:bold}
    
    .question-text{font-size:1.2em;line-height:1.5;margin-bottom:25px;font-weight:500}
    .options-group{display:flex;flex-direction:column;gap:10px}
    
    .option-label{display:flex;align-items:center;padding:15px;border:1px solid var(--border);border-radius:6px;cursor:pointer;transition:background 0.2s}
    .option-label:hover:not(.disabled){background:#f1f3f4}
    .option-input{margin-right:15px;transform:scale(1.2)}
    .option-input:checked+span{font-weight:500}
    
    .option-label.disabled {cursor: default; pointer-events: none;}
    .option-label.correct {border-color: var(--success); background-color: #e6f4ea; color: var(--success); font-weight: bold;}
    .option-label.wrong {border-color: var(--danger); background-color: #fce8e6; color: var(--danger);}

    .feedback-box {display: none; margin-top: 20px; padding: 15px; border-radius: 6px; border-left: 5px solid; background: #f8f9fa;}
    .feedback-box.correct {border-color: var(--success); background: #e6f4ea;}
    .feedback-box.wrong {border-color: var(--danger); background: #fce8e6;}
    .feedback-title {font-weight: bold; margin-bottom: 5px; display: block;}

    .nav-buttons{display:flex;justify-content:space-between;margin-top:30px}
    .btn{padding:10px 24px;border:none;border-radius:4px;font-size:1em;cursor:pointer;font-weight:500}
    .btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-dark)}
    .btn-secondary{background:#fff;color:var(--primary);border:1px solid var(--border)}.btn-secondary:hover{background:#f8f9fa}
    .score-circle{width:150px;height:150px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 30px;border:8px solid var(--border);font-size:2.5em;font-weight:bold}
    .pass{border-color:var(--success);color:var(--success)}.fail{border-color:var(--danger);color:var(--danger)}
    .hidden{display:none!important}
</style>
</head>
<body>

<div class="container">
    <h1>Google Certification Preparation</h1>
    <p class="subtitle">Select a Certification and Difficulty Level</p>
    
    <!-- SELECTION SCREEN -->
    <div id="selection-screen" class="screen active card">
        <div class="category-grid" id="category-grid">
            <!-- Populated by JS -->
        </div>
    </div>

    <!-- EXAM SCREEN -->
    <div id="exam-screen" class="screen card">
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        <div class="question-meta">
            <span><span id="cert-label"></span> <span id="diff-label"></span></span>
            <span id="question-count"></span>
        </div>
        <div id="question-container">
            <div class="question-text" id="question-text"></div>
            <div class="options-group" id="options-container"></div>
            <div id="feedback-box" class="feedback-box"></div>
        </div>
        <div class="nav-buttons">
            <button id="prev-btn" class="btn btn-secondary">Previous</button>
            <button id="next-btn" class="btn btn-primary">Next</button>
            <button id="finish-btn" class="btn btn-primary hidden">Submit Exam</button>
        </div>
    </div>

    <!-- RESULT SCREEN -->
    <div id="result-screen" class="screen card">
        <h2>Exam Results</h2>
        <div id="score-circle" class="score-circle">0%</div>
        <div style="text-align:center;margin-bottom:30px">
            <div id="result-message" style="font-size:1.5em;margin-bottom:10px"></div>
            <p>Score: <span id="score-fraction"></span></p>
            <p id="diff-result-label" style="color:#5f6368; font-size:0.9em; margin-top:5px"></p>
        </div>
        <div class="nav-buttons" style="justify-content:center;gap:20px">
            <button id="email-btn" class="btn btn-secondary">Email Results</button>
            <button id="home-btn" class="btn btn-primary">Return to Menu</button>
        </div>
    </div>
</div>

// UTILS
function shuffleArray(a) {
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

function switchScreen(name) {
    Object.values(screens).forEach(s => s.classList.remove('active'));
    screens[name].classList.add('active');
    window.scrollTo(0,0);
}

// INITIALIZATION
function init() {
    els.catGrid.innerHTML = Object.keys(questionData).map(key => {
        const cert = questionData[key];
        return `
        <div class="category-card">
            <div class="cat-title">${cert.name}</div>
            <div class="cat-meta">
                ${cert.questions.normal.length} Normal • ${cert.questions.difficult.length} Difficult
            </div>
            <div class="mode-buttons">
                <button class="mode-btn mode-normal" onclick="startExam('${key}', 'normal')">Normal</button>
                <button class="mode-btn mode-difficult" onclick="startExam('${key}', 'difficult')">Difficult</button>
            </div>
        </div>`;
    }).join('');
}

window.startExam = function(certKey, difficulty) {
    state.selectedCert = certKey;
    state.selectedDiff = difficulty;
    
    // Get questions based on difficulty
    const rawQuestions = questionData[certKey].questions[difficulty];
    
    // Shuffle Pool
    const shuffledPool = shuffleArray([...rawQuestions]);
    
    // Select all (or cap if needed, currently taking all defined)
    state.questionSet = shuffledPool.map(q => {
        let indices = Array.from(Array(q.o.length).keys()); 
        indices = shuffleArray(indices);
        return {
            text: q.t,
            options: indices.map(i => q.o[i]),
            correctIndex: indices.indexOf(q.c),
            explanation: q.e
        };
    });
    
    state.currentIdx = 0;
    state.userAnswers = new Array(state.questionSet.length).fill(null);
    state.examLength = state.questionSet.length;
    
    switchScreen('exam');
    renderQuestion();
};

function renderQuestion() {
    const q = state.questionSet[state.currentIdx];
    const isAnswered = state.userAnswers[state.currentIdx] !== null;
    const isDiff = state.selectedDiff === 'difficult';
    
    // Reset UI
    els.feedbackBox.style.display = 'none';
    els.feedbackBox.className = 'feedback-box';

    // Update Meta
    els.certLabel.innerText = questionData[state.selectedCert].name;
    els.diffLabel.innerHTML = `<span class="diff-tag">${state.selectedDiff.toUpperCase()}</span>`;
    els.qCount.innerText = `Question ${state.currentIdx + 1} of ${state.examLength}`;
    
    // Progress Bar Style
    els.progress.className = `progress-fill ${isDiff ? 'difficult' : ''}`;
    els.progress.style.width = `${((state.currentIdx + 1) / state.examLength) * 100}%`;
    
    // Text
    els.qText.innerText = q.text;
    
    // Options
    els.optsContainer.innerHTML = q.options.map((opt, i) => {
        let classes = 'option-label';
        let checked = '';
        
        if (isAnswered) {
            classes += ' disabled';
            if (i === q.correctIndex) classes += ' correct';
            if (state.userAnswers[state.currentIdx] === i && i !== q.correctIndex) classes += ' wrong';
            if (state.userAnswers[state.currentIdx] === i) checked = 'checked';
        }

        return `
        <label class="${classes}">
            <input type="radio" name="opt" class="option-input" value="${i}" 
                ${checked} 
                ${isAnswered ? 'disabled' : ''}
                onchange="handleSelection(${i})">
            <span>${opt}</span>
        </label>`
    }).join('');
    
    if(isAnswered) showFeedback(state.userAnswers[state.currentIdx]);

    // Buttons
    els.prevBtn.disabled = state.currentIdx === 0;
    
    if (state.currentIdx === state.examLength - 1) {
        els.nextBtn.classList.add('hidden');
        els.finishBtn.classList.remove('hidden');
    } else {
        els.nextBtn.classList.remove('hidden');
        els.finishBtn.classList.add('hidden');
    }
}

window.handleSelection = function(i) {
    state.userAnswers[state.currentIdx] = i;
    renderQuestion(); // Re-render to show colors lock
    showFeedback(i);
};

function showFeedback(userIndex) {
    const q = state.questionSet[state.currentIdx];
    const isCorrect = userIndex === q.correctIndex;

    els.feedbackBox.innerHTML = `
        <span class="feedback-title">${isCorrect ? '✅ Correct' : '❌ Incorrect'}</span>
        ${q.explanation}
    `;
    els.feedbackBox.className = `feedback-box ${isCorrect ? 'correct' : 'wrong'}`;
    els.feedbackBox.style.display = 'block';
}

// NAV
els.prevBtn.addEventListener('click', () => {
    if (state.currentIdx > 0) { state.currentIdx--; renderQuestion(); }
});
els.nextBtn.addEventListener('click', () => {
    if (state.currentIdx < state.examLength - 1) { state.currentIdx++; renderQuestion(); }
});
els.finishBtn.addEventListener('click', calculateResults);

// SCORING
function calculateResults() {
    let score = 0;
    state.questionSet.forEach((q, i) => {
        if (state.userAnswers[i] === q.correctIndex) score++;
    });
    
    const pct = Math.round((score / state.examLength) * 100);
    const passed = pct >= 80;
    
    els.scoreCircle.innerText = `${pct}%`;
    els.scoreCircle.className = `score-circle ${passed ? 'pass' : 'fail'}`;
    els.scoreFraction.innerText = `${score}/${state.examLength}`;
    
    const difficultyText = state.selectedDiff === 'difficult' ? "Advanced" : "Standard";
    els.diffResultLabel.innerText = `Mode: ${difficultyText}`;

    els.resultMsg.innerText = passed ? "Congratulations! You Passed." : "Keep Studying. You didn't pass.";
    els.resultMsg.style.color = passed ? "var(--success)" : "var(--danger)";
    
    // Prepare Email Button
    const certName = questionData[state.selectedCert].name;
    const diffDisplay = state.selectedDiff.charAt(0).toUpperCase() + state.selectedDiff.slice(1);
    const emailSubject = `Certification Result: ${certName} [${diffDisplay}]`;
    const emailBody = `Here are the results for the certification exam:\n\n` +
                      `Certification: ${certName}\n` +
                      `Difficulty: ${diffDisplay}\n` +
                      `Score: ${score}/${state.examLength} (${pct}%)\n` +
                      `Status: ${passed ? 'PASSED' : 'FAILED'}\n\n` +
                      `Date: ${new Date().toLocaleDateString()}`;
    
    const mailtoLink = `mailto:n.sirmopoulos@mediacube.gr?subject=${encodeURIComponent(emailSubject)}&body=${encodeURIComponent(emailBody)}`;
    
    const emailBtn = document.getElementById('email-btn');
    emailBtn.onclick = () => window.location.href = mailtoLink;

    switchScreen('result');
}

els.homeBtn.addEventListener('click', () => {
    switchScreen('selection');
    state.selectedCert = null;
});

init();

</script>
</body>
</html>
