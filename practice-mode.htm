<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google Certification Exam Simulator (Practice Mode)</title>
<style>
    :root{--primary:#1a73e8;--success:#188038;--warning:#f9ab00;--danger:#d93025;--text:#202124;--bg:#f8f9fa;--card-bg:#ffffff;--border:#dadce0}
    *{box-sizing:border-box;font-family:'Roboto','Segoe UI',sans-serif}
    body{margin:0;padding:0;background-color:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
    .container{max-width:800px;margin:40px auto;padding:20px;width:100%}
    h1,h2{text-align:center;color:var(--text)}.subtitle{text-align:center;color:#5f6368;margin-bottom:30px}
    .card{background:var(--card-bg);border-radius:8px;box-shadow:0 1px 2px 0 rgba(60,64,67,0.3);padding:30px;margin-bottom:20px}
    .screen{display:none;animation:fadeIn 0.3s ease-in-out}.screen.active{display:block}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .cert-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;margin-bottom:20px}
    .cert-option{border:2px solid var(--border);border-radius:8px;padding:20px;text-align:center;cursor:pointer;font-weight:500;transition:0.2s}
    .cert-option:hover{border-color:var(--primary);background:#e8f0fe}
    .cert-option.selected{border-color:var(--primary);background:#e8f0fe;color:var(--primary);font-weight:bold}
    .progress-bar{width:100%;height:6px;background:#e0e0e0;border-radius:3px;margin-bottom:20px}
    .progress-fill{height:100%;background:var(--primary);width:0%;transition:width 0.3s ease}
    .question-meta{display:flex;justify-content:space-between;font-size:0.9em;color:#5f6368;margin-bottom:15px}
    .question-text{font-size:1.2em;line-height:1.5;margin-bottom:25px;font-weight:500}
    .options-group{display:flex;flex-direction:column;gap:10px}
    
    /* Updated Option Styles for Feedback */
    .option-label{display:flex;align-items:center;padding:15px;border:1px solid var(--border);border-radius:6px;cursor:pointer;transition:background 0.2s}
    .option-label:hover:not(.disabled){background:#f1f3f4}
    .option-input{margin-right:15px;transform:scale(1.2)}
    .option-input:checked+span{font-weight:500}
    
    .option-label.disabled {cursor: default; pointer-events: none;}
    .option-label.correct {border-color: var(--success); background-color: #e6f4ea; color: var(--success); font-weight: bold;}
    .option-label.wrong {border-color: var(--danger); background-color: #fce8e6; color: var(--danger);}

    /* Explanation Box */
    .feedback-box {display: none; margin-top: 20px; padding: 15px; border-radius: 6px; border-left: 5px solid; background: #f8f9fa;}
    .feedback-box.correct {border-color: var(--success); background: #e6f4ea;}
    .feedback-box.wrong {border-color: var(--danger); background: #fce8e6;}
    .feedback-title {font-weight: bold; margin-bottom: 5px; display: block;}

    .nav-buttons{display:flex;justify-content:space-between;margin-top:30px}
    .btn{padding:10px 24px;border:none;border-radius:4px;font-size:1em;cursor:pointer;font-weight:500}
    .btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:#1765cc}
    .btn-secondary{background:#fff;color:var(--primary);border:1px solid var(--border)}.btn-secondary:hover{background:#f8f9fa}
    .btn:disabled{opacity:0.5;cursor:not-allowed}
    .score-circle{width:150px;height:150px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 30px;border:8px solid var(--border);font-size:2.5em;font-weight:bold}
    .pass{border-color:var(--success);color:var(--success)}.fail{border-color:var(--danger);color:var(--danger)}
    .hidden{display:none!important}
</style>
</head>
<body>

<div class="container">
    <h1>Google Exam Simulator</h1>
    <p class="subtitle">Practice Mode: Instant Feedback & Explanations</p>
    
    <div id="selection-screen" class="screen active card">
        <h2>Select Certification</h2>
        <div class="cert-grid" id="cert-grid"></div>
        <div style="text-align:center;margin-top:20px">
            <button id="start-btn" class="btn btn-primary" disabled>Start Exam</button>
        </div>
    </div>

    <div id="exam-screen" class="screen card">
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        <div class="question-meta"><span id="cert-label"></span><span id="question-count"></span></div>
        <div id="question-container">
            <div class="question-text" id="question-text"></div>
            <div class="options-group" id="options-container"></div>
            <div id="feedback-box" class="feedback-box"></div>
        </div>
        <div class="nav-buttons">
            <button id="prev-btn" class="btn btn-secondary">Previous</button>
            <button id="next-btn" class="btn btn-primary">Next</button>
            <button id="finish-btn" class="btn btn-primary hidden">Submit Exam</button>
        </div>
    </div>

    <div id="result-screen" class="screen card">
        <h2>Exam Results</h2>
        <div id="score-circle" class="score-circle">0%</div>
        <div style="text-align:center;margin-bottom:30px">
            <div id="result-message" style="font-size:1.5em;margin-bottom:10px"></div>
            <p>Score: <span id="score-fraction"></span></p>
        </div>
        <div class="nav-buttons" style="justify-content:center;gap:20px">
            <button id="retake-btn" class="btn btn-secondary">Retake Same Exam</button>
            <button id="home-btn" class="btn btn-primary">New Certification</button>
        </div>
    </div>
</div>

// STATE
const state = {
    selectedCert: null,
    questionSet: [], 
    userAnswers: [], 
    currentIdx: 0,
    examLength: 30
};

// DOM ELEMENTS
const screens = {
    selection: document.getElementById('selection-screen'),
    exam: document.getElementById('exam-screen'),
    result: document.getElementById('result-screen')
};
const els = {
    certGrid: document.getElementById('cert-grid'),
    startBtn: document.getElementById('start-btn'),
    qText: document.getElementById('question-text'),
    optsContainer: document.getElementById('options-container'),
    feedbackBox: document.getElementById('feedback-box'),
    qCount: document.getElementById('question-count'),
    certLabel: document.getElementById('cert-label'),
    prevBtn: document.getElementById('prev-btn'),
    nextBtn: document.getElementById('next-btn'),
    finishBtn: document.getElementById('finish-btn'),
    progress: document.getElementById('progress-fill'),
    scoreCircle: document.getElementById('score-circle'),
    scoreFraction: document.getElementById('score-fraction'),
    resultMsg: document.getElementById('result-message'),
    retakeBtn: document.getElementById('retake-btn'),
    homeBtn: document.getElementById('home-btn')
};

// UTILS
function shuffleArray(a) {
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

function switchScreen(name) {
    Object.values(screens).forEach(s => s.classList.remove('active'));
    screens[name].classList.add('active');
    window.scrollTo(0,0);
}

// INITIALIZATION
function init() {
    const certNames = {
        'ads-search': 'Google Ads Search',
        'ads-display': 'Google Ads Display',
        'ads-video': 'Google Ads Video',
        'ads-shopping': 'Google Ads Shopping',
        'analytics': 'Google Analytics 4'
    };
    
    els.certGrid.innerHTML = Object.keys(questionPools).map(k => 
        `<div class="cert-option" data-id="${k}" onclick="selectCert(this)">
            ${certNames[k]}<br>
            <span style="font-size:0.8em;color:#5f6368">${questionPools[k].length} Questions</span>
        </div>`
    ).join('');
}

window.selectCert = function(el) {
    document.querySelectorAll('.cert-option').forEach(d => d.classList.remove('selected'));
    el.classList.add('selected');
    state.selectedCert = el.dataset.id;
    els.startBtn.disabled = false;
    els.startBtn.innerText = "Start Exam";
};

// EXAM LOGIC
els.startBtn.addEventListener('click', generateExam);

function generateExam() {
    const pool = questionPools[state.selectedCert];
    
    // 1. Shuffle Pool
    const shuffledPool = shuffleArray([...pool]);
    
    // 2. Select up to 30
    const selectedCount = Math.min(30, shuffledPool.length);
    const selectedQuestions = shuffledPool.slice(0, selectedCount);
    
    // 3. Prepare State (Shuffle Options)
    state.questionSet = selectedQuestions.map(q => {
        let indices = Array.from(Array(q.o.length).keys()); // [0,1,2,3]
        indices = shuffleArray(indices);
        return {
            text: q.t,
            options: indices.map(i => q.o[i]),
            correctIndex: indices.indexOf(q.c),
            explanation: q.e || "No explanation available for this question." // Fallback if missing
        };
    });
    
    state.currentIdx = 0;
    state.userAnswers = new Array(state.questionSet.length).fill(null);
    state.examLength = state.questionSet.length;
    
    switchScreen('exam');
    renderQuestion();
}

function renderQuestion() {
    const q = state.questionSet[state.currentIdx];
    const isAnswered = state.userAnswers[state.currentIdx] !== null;
    
    // Reset UI
    els.feedbackBox.style.display = 'none';
    els.feedbackBox.className = 'feedback-box';

    // Update Meta
    els.certLabel.innerText = document.querySelector('.cert-option.selected').childNodes[0].nodeValue.trim(); 
    els.qCount.innerText = `Question ${state.currentIdx + 1} of ${state.examLength}`;
    els.progress.style.width = `${((state.currentIdx + 1) / state.examLength) * 100}%`;
    
    // Text
    els.qText.innerText = q.text;
    
    // Options
    els.optsContainer.innerHTML = q.options.map((opt, i) => {
        // Determine classes based on answer state
        let classes = 'option-label';
        let checked = '';
        
        if (isAnswered) {
            classes += ' disabled';
            // Highlight Correct Answer Green always
            if (i === q.correctIndex) {
                classes += ' correct';
            }
            // Highlight User Selection Red if wrong
            if (state.userAnswers[state.currentIdx] === i && i !== q.correctIndex) {
                classes += ' wrong';
            }
            if (state.userAnswers[state.currentIdx] === i) checked = 'checked';
        }

        return `
        <label class="${classes}">
            <input type="radio" name="opt" class="option-input" value="${i}" 
                ${checked} 
                ${isAnswered ? 'disabled' : ''}
                onchange="handleSelection(${i})">
            <span>${opt}</span>
        </label>`
    }).join('');
    
    // Re-show feedback if already answered (scenarios where user clicked Prev then Next)
    if(isAnswered) {
        showFeedback(state.userAnswers[state.currentIdx]);
    }

    // Buttons
    els.prevBtn.disabled = state.currentIdx === 0;
    
    if (state.currentIdx === state.examLength - 1) {
        els.nextBtn.classList.add('hidden');
        els.finishBtn.classList.remove('hidden');
    } else {
        els.nextBtn.classList.remove('hidden');
        els.finishBtn.classList.add('hidden');
    }
}

window.handleSelection = function(i) {
    // 1. Save Answer
    state.userAnswers[state.currentIdx] = i;

    // 2. Re-render options to lock them and show colors
    renderQuestion();

    // 3. Show Explanation
    showFeedback(i);
};

function showFeedback(userIndex) {
    const q = state.questionSet[state.currentIdx];
    const isCorrect = userIndex === q.correctIndex;

    els.feedbackBox.innerHTML = `
        <span class="feedback-title">${isCorrect ? '✅ Correct' : '❌ Incorrect'}</span>
        ${q.explanation}
    `;
    els.feedbackBox.className = `feedback-box ${isCorrect ? 'correct' : 'wrong'}`;
    els.feedbackBox.style.display = 'block';
}

// NAV
els.prevBtn.addEventListener('click', () => {
    if (state.currentIdx > 0) { state.currentIdx--; renderQuestion(); }
});
els.nextBtn.addEventListener('click', () => {
    if (state.currentIdx < state.examLength - 1) { state.currentIdx++; renderQuestion(); }
});
els.finishBtn.addEventListener('click', calculateResults);

// SCORING
function calculateResults() {
    let score = 0;
    state.questionSet.forEach((q, i) => {
        if (state.userAnswers[i] === q.correctIndex) score++;
    });
    
    const pct = Math.round((score / state.examLength) * 100);
    const passed = pct >= 80;
    
    els.scoreCircle.innerText = `${pct}%`;
    els.scoreCircle.className = `score-circle ${passed ? 'pass' : 'fail'}`;
    els.scoreFraction.innerText = `${score}/${state.examLength}`;
    els.resultMsg.innerText = passed ? "Congratulations! You Passed." : "Keep Studying. You didn't pass.";
    els.resultMsg.style.color = passed ? "var(--success)" : "var(--danger)";
    
    switchScreen('result');
}

// RESET
els.retakeBtn.addEventListener('click', generateExam);
els.homeBtn.addEventListener('click', () => {
    switchScreen('selection');
    state.selectedCert = null;
    document.querySelectorAll('.cert-option').forEach(d => d.classList.remove('selected'));
    els.startBtn.disabled = true;
    els.startBtn.innerText = "Start Exam";
});

init();

</script>
